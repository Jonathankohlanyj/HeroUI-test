<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>HeroUI Playground</title>
  <!-- Load HeroUI CSS from jsDelivr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@heroui/styles/dist/heroui.min.css">
</head>
<body style="background:#09090b; min-height:100vh;">
  <div id="root"></div>
  <script type="module">
    import React from "https://esm.sh/react";
    import { createRoot } from "https://esm.sh/react-dom/client";
    import {
      HeroUIProvider,
      Button,
      Card,
      Tabs,
      Tab,
      Input,
      Select,
      SelectItem,
      Switch,
      Slider,
      Chip,
      Badge,
      Avatar,
      Progress,
      Spinner,
      Checkbox,
      Textarea
    } from "https://esm.sh/@heroui/react";

    function App() {
      return (
        <HeroUIProvider>
          <main className="min-h-screen text-white p-6">
            <h1 className="text-3xl font-bold mb-4">HeroUI Playground</h1>
            <Tabs aria-label="Example tabs" variant="underlined">
              <Tab key="buttons" title="Buttons">
                <Card className="p-5 space-y-3">
                  <Button color="primary">Primary</Button>
                  <Button color="secondary">Secondary</Button>
                  <Button color="success">Success</Button>
                  <Button color="warning">Warning</Button>
                  <Button color="danger">Danger</Button>
                  <Button variant="bordered">Bordered</Button>
                </Card>
              </Tab>
              <Tab key="forms" title="Forms">
                <Card className="p-5 space-y-4">
                  <Input label="Username" placeholder="Type here" />
                  <Input label="Email" placeholder="you@example.com" type="email" />
                  <Textarea label="Message" placeholder="Write something..." />
                  <Select label="Framework">
                    <SelectItem key="react">React</SelectItem>
                    <SelectItem key="vite">Vite</SelectItem>
                    <SelectItem key="heroui">HeroUI</SelectItem>
                  </Select>
                  <Checkbox defaultSelected>Enable special mode</Checkbox>
                  <Switch defaultSelected>Dark mode</Switch>
                </Card>
              </Tab>
              <Tab key="status" title="Status">
                <Card className="p-5 space-y-4">
                  <div className="flex items-center gap-3">
                    <Badge content="3" color="danger">
                      <Avatar name="H" />
                    </Badge>
                    <Chip color="success">Online</Chip>
                    <Spinner color="primary" />
                  </div>
                  <Slider label="Power level" defaultValue={60} />
                  <Progress label="Build progress" value={75} color="primary" />
                </Card>
              </Tab>
            </Tabs>
          </main>
        </HeroUIProvider>
      );
    }

    const root = document.getElementById("root");
    createRoot(root).render(<App />);
  </script>
</body>
</html>
