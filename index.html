<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>HeroUI Playground</title>

<style>
body{
margin:0;
padding:24px;
background:#09090b;
color:white;
font-family:Inter,system-ui;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
font-size:42px;
margin-bottom:24px;
}

.tabs{
display:flex;
gap:12px;
margin-bottom:24px;
flex-wrap:wrap;
}

.tab{
background:#18181b;
border:1px solid #27272a;
color:white;
padding:14px 20px;
border-radius:18px;
cursor:pointer;
font-weight:600;
}

.active{
border-color:#3b82f6;
box-shadow:0 0 0 2px #3b82f633;
}

.card{
background:#18181b;
border:1px solid #27272a;
border-radius:24px;
padding:24px;
}

.hidden{
display:none;
}

button{
border:none;
padding:14px 20px;
border-radius:16px;
font-weight:600;
cursor:pointer;
margin:6px;
}

.primary{background:#3b82f6;color:white;}
.secondary{background:#27272a;color:white;}
.success{background:#22c55e;color:white;}
.danger{background:#ef4444;color:white;}

input{
width:100%;
padding:16px;
margin:10px 0;
border:none;
border-radius:16px;
background:#27272a;
color:white;
box-sizing:border-box;
}
</style>
</head>
<body>

<div class="container">
<h1>HeroUI Playground</h1>

<div class="tabs">
<div class="tab active" onclick="show('buttons',this)">Buttons</div>
<div class="tab" onclick="show('forms',this)">Forms</div>
<div class="tab" onclick="show('misc',this)">Misc</div>
</div>

<div id="buttons" class="card">
<button class="primary">Primary</button>
<button class="secondary">Secondary</button>
<button class="success">Success</button>
<button class="danger">Danger</button>
</div>

<div id="forms" class="card hidden">
<input placeholder="Username">
<input placeholder="Email">
</div>

<div id="misc" class="card hidden">
Real mobile GitHub compatible playground.
</div>
</div>

<script>
function show(id,el){
document.querySelectorAll(".card").forEach(c=>c.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
el.classList.add("active");
}
</script>

</body>
</html>
