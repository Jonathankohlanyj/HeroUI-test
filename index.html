<!DOCTYPE html>
<html lang="en" class="dark" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeroUI Playground</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@heroui/styles/dist/heroui.min.css">

  <style>
    body {
      margin: 0;
      background: #09090b;
      min-height: 100vh;
      font-family: system-ui;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="module">
import React from "https://esm.sh/react@19";
import { createRoot } from "https://esm.sh/react-dom@19/client";

import {
  HeroUIProvider,
  Button,
  Card,
  CardBody,
  Input,
  Tabs,
  Tab,
  Switch,
  Slider,
  Chip
} from "https://esm.sh/@heroui/react";

const e = React.createElement;

function App() {
  return e(
    "main",
    { className: "min-h-screen bg-background text-foreground p-6" },

    e("h1", {
      className: "text-4xl font-bold mb-6"
    }, "HeroUI Playground"),

    e(
      Tabs,
      { "aria-label": "tabs" },

      e(
        Tab,
        { key: "buttons", title: "Buttons" },
        e(
          Card,
          null,
          e(
            CardBody,
            { className: "flex gap-3 p-6 flex-wrap" },
            e(Button, { color: "primary" }, "Primary"),
            e(Button, { color: "secondary" }, "Secondary"),
            e(Button, { color: "success" }, "Success"),
            e(Button, { color: "danger" }, "Danger")
          )
        )
      ),

      e(
        Tab,
        { key: "forms", title: "Forms" },
        e(
          Card,
          null,
          e(
            CardBody,
            { className: "p-6 gap-4 flex flex-col" },
            e(Input, {
              label: "Username",
              placeholder: "type here"
            }),
            e(Switch, {
              defaultSelected: true
            }),
            e(Slider, {
              label: "Power",
              defaultValue: 50
            })
          )
        )
      ),

      e(
        Tab,
        { key: "misc", title: "Misc" },
        e(
          Card,
          null,
          e(
            CardBody,
            { className: "p-6 flex gap-3" },
            e(Chip, { color: "warning" }, "HeroUI"),
            e(Chip, { color: "success" }, "Works")
          )
        )
      )
    )
  );
}

createRoot(document.getElementById("root")).render(
  e(
    HeroUIProvider,
    null,
    e(App)
  )
);
</script>

</body>
</html>
